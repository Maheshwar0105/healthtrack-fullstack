version: '3.8'

services:
  mongo:
    image: mongo:latest
    container_name: healthtrack-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:alpine
    container_name: healthtrack-cache
    ports:
      - "6379:6379"

  backend:
    build: ./healthtrack-backend
    container_name: healthtrack-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/healthtrack
      - JWT_SECRET=supersecretjwtkey1234567890
      - FRONTEND_URL=http://localhost:3000
      - ENABLE_SOCKETIO=true
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis

  frontend:
    build: ./healthtrack-frontend
    container_name: healthtrack-app
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
