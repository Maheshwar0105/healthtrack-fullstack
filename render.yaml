services:
  - type: web
    name: healthtrack-backend
    env: node
    plan: free
    rootDir: healthtrack-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: ENABLE_SOCKETIO
        value: "true"
      - key: MONGO_URI
        sync: false
        placeholder: "Your MongoDB Atlas connection URI"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
        placeholder: "Your Netlify Frontend URL (https://healthtrack05.netlify.app)"
      - key: MAPBOX_TOKEN
        sync: false
        placeholder: "Your Mapbox access token (optional)"
      - key: GEMINI_API_KEY
        sync: false
        placeholder: "Your Google Gemini API key (optional)"
